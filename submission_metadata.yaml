# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Deterministic offline two-stage ranker for the Senior AI Engineer JD. The JD
  is first converted into rubric.yaml, a structured ideal-candidate profile that
  defines what each resume is scored against. Stage 1 streams all 100K
  candidates and retrieves the strongest 1500 using rubric-derived signals:
  role fit, core AI/search/retrieval skills, career-history evidence,
  product-company background, India/location fit, Redrob availability signals,
  and optional precomputed dense similarity. Stage 2 reranks with capped
  structured components rather than live embedding or LLM calls: senior
  ML/search roles, production retrieval/ranking evidence, vector/hybrid search
  infrastructure, ranking evaluation metrics, skill trust, product-company
  experience, and behavioral readiness. Honeypot-like profiles are not
  hard-coded by ID; they are penalized through generic trap checks such as
  non-tech keyword stuffing, expert skills with zero duration, inconsistent
  experience duration, pure research/no production evidence, CV/speech-only
  profiles, long inactivity, poor recruiter response, and long notice periods.
  Reasoning is generated deterministically from candidate JSON facts only.

